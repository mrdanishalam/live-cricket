<!DOCTYPE html>
<html>
<head>

<title>🏏 LIVE CRICKET</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="navbar">

<div class="logo">
STS LIVE
</div>

<div class="live-badge">
● LIVE
</div>

</div>

<div class="hero">

<div class="video-card">

<video
id="video"
autoplay
playsinline
controls>
</video>

</div>

<div class="score-panel">

<div class="score-card">

<div class="match-title"
id="teams">

Team Hassan vs Royal Tigers

</div>

<div class="score"
id="score">

0/0

</div>

<div class="overs"
id="overs">

0.0 Overs

</div>

<div class="info-grid">

<div class="info-box">
<h4>Run Rate</h4>
<p id="rr">0.00</p>
</div>

</div>

</div>

</div>

</div>

<!-- BATTING -->

<div class="table-card">

<h2>🏏 Batting Scorecard</h2>

<table>

<thead>

<tr>
<th>Player</th>
<th>R</th>
<th>B</th>
<th>4s</th>
<th>6s</th>
<th>Status</th>
</tr>

</thead>

<tbody id="battingTable">
</tbody>

</table>

</div>

<!-- BOWLING -->

<div class="table-card">

<h2>🎯 Bowling</h2>

<table>

<thead>

<tr>
<th>Bowler</th>
<th>O</th>
<th>R</th>
<th>W</th>
</tr>

</thead>

<tbody id="bowlingTable">
</tbody>

</table>

</div>

<!-- COMMENTARY -->

<div class="commentary">

<h2>📢 Commentary</h2>

<div id="commentaryBox"></div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="app.js"></script>

</body>
</html>
