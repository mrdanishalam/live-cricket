<!DOCTYPE html>
<html>
<head>

<title>Broadcast</title>

<style>

body{
margin:0;
background:black;
}

video{
width:100%;
height:100vh;
object-fit:cover;
}

</style>

</head>

<body>

<video
id="video"
autoplay
muted
playsinline>
</video>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const video =
document.getElementById("video");

const peerConnections = {};

const config = {

  iceServers:[
    {
      urls:"stun:stun.l.google.com:19302"
    }
  ]

};

navigator.mediaDevices
.getUserMedia({

  video:true,
  audio:true

})
.then(stream=>{

  video.srcObject = stream;

  socket.emit("broadcaster");

  socket.on(
    "watcher",
    async id=>{

      const peerConnection =
      new RTCPeerConnection(config);

      peerConnections[id] =
      peerConnection;

      stream.getTracks()
      .forEach(track=>{

        peerConnection
        .addTrack(track,stream);

      });

      const offer =
      await peerConnection
      .createOffer();

      await peerConnection
      .setLocalDescription(
        offer
      );

      socket.emit(
        "offer",
        id,
        peerConnection.localDescription
      );

      peerConnection.onicecandidate =
      event=>{

        if(event.candidate){

          socket.emit(
            "candidate",
            id,
            event.candidate
          );

        }

      };

  });

  socket.on(
    "answer",
    (id,description)=>{

      peerConnections[id]
      .setRemoteDescription(
        description
      );

  });

  socket.on(
    "candidate",
    (id,candidate)=>{

      peerConnections[id]
      .addIceCandidate(
        new RTCIceCandidate(candidate)
      );

  });

});
</script>

</body>
</html>
