<!DOCTYPE html>
<html>
<head>

<title>Broadcast</title>

</head>

<body>

<video
id="video"
autoplay
muted
playsinline
style="width:100%">
</video>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const video =
document.getElementById("video");

const peerConnections = {};

const config = {

iceServers:[
{
urls:"stun:stun.l.google.com:19302"
}
]

};

navigator.mediaDevices
.getUserMedia({

video:true,
audio:true

})
.then(stream=>{

video.srcObject = stream;

setTimeout(()=>{

socket.emit("broadcaster");

},1000);

socket.on("watcher",id=>{

const peerConnection =
new RTCPeerConnection(config);

peerConnections[id] =
peerConnection;

stream.getTracks().forEach(track=>
peerConnection.addTrack(
track,
stream
)
);

peerConnection.onicecandidate =
event=>{

if(event.candidate){

socket.emit(
"candidate",
id,
event.candidate
);

}

};

peerConnection
.createOffer()
.then(sdp=>
peerConnection
.setLocalDescription(sdp)
)
.then(()=>{

socket.emit(
"offer",
id,
peerConnection.localDescription
);

});

});

socket.on(
"answer",
(id,description)=>{

peerConnections[id]
.setRemoteDescription(
description
);

});

socket.on(
"candidate",
(id,candidate)=>{

peerConnections[id]
.addIceCandidate(
new RTCIceCandidate(candidate)
);

});

});

</script>

</body>
</html>
